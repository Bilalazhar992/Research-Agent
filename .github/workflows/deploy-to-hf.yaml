name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          git remote add hf \
            https://bilalazhar992:${HF_TOKEN}@huggingface.co/spaces/bilalazhar992/Research-Agent123

          echo "Waiting 30s before first push to avoid rate limits..."
          sleep 30

          max_attempts=3
          attempt=1

          until git push hf main --force; do
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "Push failed after ${max_attempts} attempts."
              exit 1
            fi
            sleep_seconds=$((attempt * 120))
            echo "Retrying in ${sleep_seconds}s (attempt ${attempt}/${max_attempts})..."
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

          echo "Successfully deployed to Hugging Face Space!"